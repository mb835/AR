name: presanitz_ar
description: Muzejní průvodce s AR - Bitva u Příbrami 1420
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Skener QR kódů
  mobile_scanner: ^6.0.2

  # Správa oprávnění
  permission_handler: 12.0.1

  # Web-AR – InAppWebView pro nativní WebRTC/kameru (Honor 400)
  flutter_inappwebview: ^6.1.5

  # Vizuální styl a fonty
  google_fonts: ^6.2.1

  # State management
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/models/
    - assets/images/markers/
    - assets/images/ui/